# StructVerify Lab v2.0 — 기본 설정
app:
  name: "StructVerify Lab"
  version: "0.2.0"
  debug: true

# backend/config/default.yaml
# llm 섹션을 아래로 교체

llm:
  provider: "hcx"                    # openai → hcx 로 변경
  models:
    heavy:      "HCX-003"            # 복잡한 태스크 (check-worthiness, 설명 생성) — v1 API
    light:      "HCX-DASH-002"       # 빠른 분류 (도메인, candidate scoring) — v3 API
    structured: "HCX-007"            # JSON 구조화 추출 (schema_inductor 전용) — v3 Structured Outputs
    reasoning:  "HCX-003"            # 복합 근거 종합
  temperature: 0.1
  max_tokens: 2048
  api_key_env: "NCP_API_KEY" # .env에 세팅

embedding:
  provider: "hcx"
  model: "HCX-EMB-V2"          # 임베딩 모델 v2
  api_key_env: "NCP_API_KEY"

reranker:
  provider: "hcx"
  model: "HCX-RERANKER"        # 리랭커 모델
  api_key_env: "NCP_API_KEY"

kosis:
  base_url: "https://kosis.kr/openapi"
  api_key_env: "KOSIS_API_KEY"
  timeout: 30

database:
  url: "postgresql+asyncpg://user:pass@localhost:5432/structverify"

graph:
  provider: "neo4j"             # "neo4j" | "memgraph"
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password_env: "NEO4J_PASSWORD"

storage:
  provider: "minio"
  endpoint: "http://localhost:9000"
  bucket: "structverify-raw"
  access_key_env: "MINIO_ACCESS_KEY"
  secret_key_env: "MINIO_SECRET_KEY"

redis:
  url: "redis://localhost:6379/0"

dwh:
  provider: "snowflake"         # "snowflake" | "bigquery" | "clickhouse"
  snowflake:
    account_env: "SNOWFLAKE_ACCOUNT"
    user_env: "SNOWFLAKE_USER"
    password_env: "SNOWFLAKE_PASSWORD"
    warehouse: "STRUCTVERIFY_WH"
    database: "STRUCTVERIFY_DB"
    schema: "PUBLIC"

adaptation:
  feedback_threshold: 10        # 학습 트리거 최소 피드백 수
  eval_min_score: 0.85          # 배포 게이트 최소 점수
  mlflow_tracking_uri: "http://localhost:5000"

verification:
  tolerance_percent: 1.0
  min_confidence: 0.7
  
candidate_detection:
  enabled: true
  threshold: 0.65
  use_surface_signals: true
  teacher_llm_fallback: true

observability:
  langfuse_enabled: false
  log_level: "INFO"
